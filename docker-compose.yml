services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aikya}
      MYSQL_USER: ${MYSQL_USER:-aikya}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aikya}
    ports:
      - "3306:3306"
    volumes:
      - aikya_mysql:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MYSQL_URL: ${MYSQL_URL:-}
      MYSQL_HOST: ${MYSQL_HOST:-db}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-aikya}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aikya}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aikya}
      MYSQL_SSL: ${MYSQL_SSL:-false}
      JWT_SECRET: ${JWT_SECRET}
      INTEGRATION_MASTER_KEY: ${INTEGRATION_MASTER_KEY}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      BUSINESS_INBOX: ${BUSINESS_INBOX}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      INTEGRATION_GITHUB_CLIENT_ID: ${INTEGRATION_GITHUB_CLIENT_ID}
      INTEGRATION_GITHUB_CLIENT_SECRET: ${INTEGRATION_GITHUB_CLIENT_SECRET}
    expose:
      - "3001"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:2025}
        VITE_GITHUB_CLIENT_ID: ${VITE_GITHUB_CLIENT_ID}
    ports:
      - "2025:80"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  aikya_mysql:
